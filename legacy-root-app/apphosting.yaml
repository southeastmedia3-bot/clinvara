# Firebase App Hosting configuration for CLINVARA.
# Public Firebase web config is safe to check in. Private values such as
# GROQ_API_KEY, AUTH_SECRET, GOOGLE_CLIENT_SECRET, and FACEBOOK_CLIENT_SECRET
# should be added in Firebase App Hosting > Backend > Settings > Environment
# or stored as Cloud Secret Manager secrets.
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAwvH6tBJ7RR8zgUfV9ckCdJDLdhV_yimI"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "clinvara-f6235.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "clinvara-f6235"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "clinvara-f6235.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "869907183409"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:869907183409:web:314562ee99980ae27c2210"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-DYB2VHQSF0"
    availability:
      - BUILD
      - RUNTIME
